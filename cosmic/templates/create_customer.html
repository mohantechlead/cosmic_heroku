{% extends "cosmic_base.html" %}

{% block content %}
<style>
    .customer-create-page {
        min-height: calc(100vh - 60px);
        padding: 28px 32px;
        background: linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%);
    }

    .customer-create-card {
        max-width: 1024px;
        margin: 0 auto;
        border: 0;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 18px 45px rgba(30, 68, 147, 0.12);
        background-color: #ffffff;
    }

    .customer-create-header {
        padding: 28px 32px 20px;
        background: linear-gradient(135deg, #0f4c81 0%, #2278b6 100%);
        color: #ffffff;
    }

    .customer-create-header h1 {
        margin: 0 0 6px;
        font-size: 30px;
        font-weight: 600;
        letter-spacing: 0.2px;
    }

    .customer-create-header p {
        margin: 0;
        color: rgba(255, 255, 255, 0.85);
        font-size: 14px;
    }

    .customer-create-body {
        padding: 28px 32px 32px;
    }

    .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px 20px;
    }

    .field-group {
        display: flex;
        flex-direction: column;
        gap: 7px;
    }

    .field-group label {
        margin: 0;
        font-weight: 600;
        font-size: 13px;
        color: #2f3e5f;
        letter-spacing: 0.2px;
    }

    .field-group .form-control {
        height: 42px;
        border-radius: 10px;
        border: 1px solid #ced6eb;
        box-shadow: none;
        padding: 10px 12px;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .field-group .form-control:focus {
        border-color: #2d77ff;
        box-shadow: 0 0 0 3px rgba(45, 119, 255, 0.15);
    }

    .field-group-full {
        grid-column: span 2;
    }

    .field-group textarea.form-control {
        height: 130px;
        resize: vertical;
    }

    .form-actions {
        margin-top: 24px;
        display: flex;
        justify-content: flex-end;
        gap: 10px;
    }

    .btn-create-customer {
        border: 0;
        border-radius: 10px;
        min-width: 150px;
        height: 44px;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.2px;
        color: #ffffff;
        background: linear-gradient(135deg, #1948a3 0%, #2d77ff 100%);
        box-shadow: 0 10px 20px rgba(45, 119, 255, 0.25);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-create-customer:hover {
        transform: translateY(-1px);
        box-shadow: 0 14px 24px rgba(45, 119, 255, 0.28);
    }

    @media (max-width: 992px) {
        .customer-create-page {
            padding: 20px;
        }

        .customer-create-header,
        .customer-create-body {
            padding-left: 20px;
            padding-right: 20px;
        }
    }

    @media (max-width: 768px) {
        .form-grid {
            grid-template-columns: 1fr;
        }

        .field-group-full {
            grid-column: span 1;
        }

        .form-actions {
            justify-content: stretch;
        }

        .btn-create-customer {
            width: 100%;
        }
    }
</style>

<section class="customer-create-page">
    <div class="customer-create-card">
        <div class="customer-create-header">
            <h1>Create Customer</h1>
            <p>Add a new customer profile with contact and communication details.</p>
        </div>

        <div class="customer-create-body">
            <form method="post" action="{% url 'create_customer' %}" id="form1">
                {% csrf_token %}

                <div class="form-grid">
                    <div class="field-group">
                        <label for="customer_name">Customer Name</label>
                        <input type="text" class="form-control" id="customer_name" name="customer_name" placeholder="Enter customer name" required>
                    </div>

                    <div class="field-group">
                        <label for="contact_person">Contact Person</label>
                        <input type="text" class="form-control" id="contact_person" name="contact_person" placeholder="Primary contact person">
                    </div>

                    <div class="field-group">
                        <label for="phone_number">Phone Number</label>
                        <input type="text" class="form-control" id="phone_number" name="phone_number" placeholder="e.g. +60 12-345 6789">
                    </div>

                    <div class="field-group">
                        <label for="email">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="customer@example.com">
                    </div>

                    <div class="field-group field-group-full">
                        <label for="customer_address">Customer Address</label>
                        <input type="text" class="form-control" id="customer_address" name="customer_address" placeholder="Street, city, postcode, state">
                    </div>

                    <div class="field-group field-group-full">
                        <label for="comments">Comments</label>
                        <textarea class="form-control" id="comments" name="comments" placeholder="Add notes, delivery preferences, or payment terms"></textarea>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-create-customer">Create Customer</button>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
